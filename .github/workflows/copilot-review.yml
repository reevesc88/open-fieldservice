name: Request Copilot Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: request-copilot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  request-copilot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Request Copilot review
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: prNumber,
                reviewers: ['copilot-pull-request-reviewer[bot]'],
              });
              core.info('Copilot review requested');
            } catch (e) {
              const status = e.response?.status;
              const msg = e.response?.data?.message ?? e.message;
              // 422 = reviewer already requested or not a collaborator — benign
              if (status === 422) {
                core.warning(`Reviewer request returned 422 (benign): ${msg}`);
              } else {
                core.error(`Reviewer request failed: ${status ?? ''} ${msg}`);
                throw e;
              }
            }
