language: "en-US"
tone_instructions: "Be concise and direct. Flag security issues like exposed API keys, missing .gitignore entries, and hardcoded credentials. Flag data loss risks. Skip style nitpicks."
reviews:
  profile: "assertive"
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main
      - master
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/*.lock"
    - "!**/venv/**"
    - "!**/node_modules/**"
    - "!**/frameworks/**"
    - "!**/dist/**"
    - "!**/build/**"
  review_status: true
  poem: false
  collapse_walkthrough: false
chat:
  auto_reply: true
knowledge_base:
  opt_out: true
